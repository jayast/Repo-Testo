<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
        background-color: royalblue;
    }
    form{
        margin: 20px;
        padding: 10px;
        text-align: center;
    }

    label{
        margin: 40px;
        padding: 20px;
    }
    input{
        padding: 15px 20px ;
        color: black;
        border: 3px solid black;
        border-radius: 30px;
    }
    input:hover{
        background-color: coral;
        border: 5px solid black;
        color: black;
    }
    textarea{
        padding: 10px;
        color: black;
        border: 3px solid black;
        border-radius: 20px;
    }
    textarea:hover{
        background-color:burlywood ;
        border: 5px solid aquamarine;
        border-radius: 20px;
    }
</style>
<body>
    <center>
    <form action="" method="get">
        <label for="">Name : </label><input type="text" required placeholder="Enter Your Name"><br><br>
        <label for="">Email : </label><input type="email" required placeholder="Enter Your Email"><br><br>
        <input type="radio" name="Year of Study">1st
        <input type="radio" name="Year of Study">2nd
        <input type="radio" name="Year of Study">3rd
        <input type="radio" name="Year of Study">4th <br><br>
        <select>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select><br><br>
        <input type="range">Rating <br><br>
        <textarea rows="4" cols="30" placeholder="Your Suggestions..."></textarea><br><br>
        <input type="color" name="Banner Colors"> colors <br><br>
        <input type="submit" value="submit" style="padding: 10px 20px;">
        <input type="reset" value="reset" style="padding: 10px 20px;">
    </form>
    </center>
</body>
</html>
