<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
</head>
<style>
    body{
        margin: 0px;
        padding: 0px;
        text-align: center;
    }.card{
        background-color: #f9f9f9;
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        border: 2px solid blue;
        border-radius: 10px;
        box-shadow: 5px 5px 15px blue;
    }
    .card:hover{
        border: blue solid 4px;
        border-radius: 20px;
    }
    .card img{
        width: 100px;
        height: 100px;
        border: 3px solid black;
        border-radius: 50%;
        margin-bottom: 15px;
    }
    .card img:hover{
        background-color: #0056b3;
        border: 5px solid black;
        border-radius: 60px;
    }
    .card h1{
        font-size: 24px;
        margin: 10px 0;
    }
    .card h2{
        font-size: 18px;
        color: #888;
        margin: 5px 0;
    }
    .card p{
        font-size: 14px;
        color: #555;
        margin: 15px 0;
    }
    .card button{
        background-color: #007bff;
        color: white;
        border: px solid #0e0429;
        padding: 10px 25px;
        margin: 5px;
        color: black;
        border-radius: 20px;
        
    }
    .card button:hover{
        background-color: #0056b3;
        border: 4px solid black;
        border-radius: 20px;
    }
    
    
</style>
<body class="card">
    <img src="/tom.jpeg" alt="img">
    <h1>JAYASURYA M</h1>
    <h2>MERN STACK DEVELOPER</h2>
    <p>I am a passionate MERN stack developer with experience in building modern web applications.</p>
    <button>React</button>
    <button>Node.js</button>
    <button>MongoDB</button>
    <button>Express.js</button>
    <p style="letter-spacing: 15px;"> 🌞 | 🎯 | 🚀  </p>
    <button>View Profile</button>
</body>
</html>
